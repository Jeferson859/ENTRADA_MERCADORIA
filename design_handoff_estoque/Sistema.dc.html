<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070B12;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(59,169,255,.22);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(59,169,255,.4)}
</style>
</helmet>

<div style="display:flex;min-height:100vh;background:#070B12;font-family:Inter,sans-serif">

  <!-- SIDEBAR -->
  <aside style="position:sticky;top:0;align-self:flex-start;height:100vh;width:236px;flex-shrink:0;background:linear-gradient(180deg,#0B1322,#080D17);border-right:1px solid rgba(59,169,255,.14);display:flex;flex-direction:column;padding:22px 16px">
    <!-- brand -->
    <div style="display:flex;align-items:center;gap:12px;padding:0 6px 22px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)">
      <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,#2E7CF6,#00D4FF);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 6px 20px rgba(46,124,246,.35);flex-shrink:0">📦</div>
      <div style="min-width:0">
        <div style="font-size:14.5px;font-weight:800;color:#F2F6FC;letter-spacing:-.01em;line-height:1.1">AdriLar</div>
        <div style="font-size:10.5px;color:#6B7385;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Estoque</div>
      </div>
    </div>
    <!-- nav -->
    <nav style="display:flex;flex-direction:column;gap:4px;margin-top:14px">
      <sc-for list="{{ nav }}" as="n" hint-placeholder-count="3">
        <button onClick="{{ n.onClick }}" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;padding:12px 13px;border-radius:11px;background:{{ n.bg }};color:{{ n.fg }};transition:all .15s;position:relative">
          <span style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:{{ n.barH }};border-radius:3px;background:{{ n.bar }};transition:height .15s"></span>
          <span style="font-size:17px;width:22px;text-align:center;flex-shrink:0">{{ n.icon }}</span>
          <span style="min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ n.label }}</span>
        </button>
      </sc-for>
    </nav>
    <!-- footer -->
    <div style="margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(255,255,255,.06)">
      <div style="display:flex;align-items:center;gap:9px">
        <div style="width:32px;height:32px;border-radius:9px;background:rgba(59,169,255,.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#9CC6FF;flex-shrink:0">JA</div>
        <div style="min-width:0">
          <div style="font-size:12px;font-weight:600;color:#C4CCDA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Jeferson A.</div>
          <div style="font-size:10px;color:#5E6678">administrador</div>
        </div>
      </div>
      <div style="font-size:9.5px;color:#3A4150;margin-top:12px;line-height:1.5">v2.0 · produto interno<br>conectado: AdriLar</div>
    </div>
  </aside>

  <!-- CONTENT -->
  <main style="flex:1;min-width:0;position:relative">
    <div style="display:{{ showEstoque }}">
      <dc-import name="Estoque Giro e Ruptura" embutido="{{ true }}" hint-size="100%,100vh"></dc-import>
    </div>
    <div style="display:{{ showVendas }}">
      <dc-import name="Dashboard de Vendas" embutido="{{ true }}" hint-size="100%,100vh"></dc-import>
    </div>
    <div style="display:{{ showPedidos }}">
      <dc-import name="Pedidos" embutido="{{ true }}" hint-size="100%,100vh"></dc-import>
    </div>
  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1680,&quot;height&quot;:1050}}">
class Component extends DCLogic {
  state = { secao: 'estoque' };
  renderVals(){
    const {secao} = this.state;
    const items = [
      {key:'estoque', icon:'📦', label:'Estoque'},
      {key:'vendas',  icon:'📊', label:'Vendas'},
      {key:'pedidos', icon:'📋', label:'Pedidos'},
    ];
    const nav = items.map(it=>{
      const active = secao===it.key;
      return {icon:it.icon, label:it.label,
        bg: active? 'rgba(59,169,255,.13)' : 'transparent',
        fg: active? '#EAF2FF' : '#8B92A5',
        bar: active? 'linear-gradient(180deg,#2E7CF6,#00D4FF)' : 'transparent',
        barH: active? '22px' : '0px',
        onClick: ()=>this.setState({secao:it.key})};
    });
    return {
      nav,
      showEstoque: secao==='estoque' ? 'block' : 'none',
      showVendas:  secao==='vendas'  ? 'block' : 'none',
      showPedidos: secao==='pedidos' ? 'block' : 'none',
    };
  }
}
</script>
</body>
</html>
